server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the standalone app server.
    # Set APP_SERVER_URL to the server's origin, e.g. http://netprovision-server:3001
    location /api/ {
        proxy_pass ${APP_SERVER_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-file routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
